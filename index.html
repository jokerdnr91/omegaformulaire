<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title> Ω OMEGAFIT Ω </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #000;
    color: white;
    overflow: hidden;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    display: flex;
    padding: 20px 40px;
    z-index: 1000;
}

.logo {
    color: #ff0000;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 2px;
}

.menu {
    margin-left: 40px;
}

.menu a {
    margin-right: 25px;
    cursor: pointer;
    position: relative;
}

.menu a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: red;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.menu a:hover::after {
    width: 100%;
}

/* PAGES */
.page {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}

.active {
    display: flex;
}

/* HERO */
.hero {
    background: linear-gradient(to bottom, #000, #300000);
}

.hero h1 {
    font-size: 50px;
    color: red;
    animation: fadeUp 1s ease;
}

.hero p {
    opacity: 0.8;
}

/* OFFRES */
.cards {
    display: flex;
    gap: 30px;
}

.card {
    background: #111;
    padding: 40px;
    border-radius: 15px;
    width: 260px;
    transition: 0.4s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    background: linear-gradient(135deg, #ff0000, #300000);
}

/* FORM */
form {
    width: 100%;
    max-width: 400px;
}

input, textarea {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background: #111;
    color: white;
}

input:focus, textarea:focus {
    outline: 2px solid red;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    background: red;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff3333;
}

/* ANIMATION */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 768px) {
    .hero h1 {
        font-size: 32px;
    }

    .cards {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<nav>
    <div class="logo">OMEGAFIT</div>
    <div class="menu">
        <a onclick="showPage('accueil')">Accueil</a>
        <a onclick="showPage('offre')">Offre</a>
        <a onclick="showPage('resultats')">Résultats</a>
    </div>
</nav>

<!-- ACCUEIL -->
<div id="accueil" class="page active hero">
    <h1>Transforme ton corps</h1>
</div>

<!-- OFFRE -->
<div id="offre" class="page">
    <h1>coaching en salle </h1>

    <div class="cards">
        <div class="card" onclick="goForm()">
            <h2>coaching </h2>
            <p>30€/mois</p>
        </div>
    </div>
</div>

<!-- RESULTATS -->
<div id="resultats" class="page">
    <h1>Résultats</h1>
    <p>Transformations clients bientôt disponibles</p>
</div>

<script> 
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

function goForm() {
    showPage('formulaire');
}

document.getElementById("coachingForm").addEventListener("submit", function(e) {
    e.preventDefault();

    window.location.href =
    `mailto:TONEMAIL@gmail.com?subject=Coaching Ghost&body=${encodeURIComponent(body)}`;
});
</script>

</body>
</html>
