<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title> Ω OMEGAFIT Ω </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #000;
    color: white;
    overflow: hidden;
}

nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    display: flex;
    padding: 20px 40px;
    z-index: 1000;
}

.logo {
    color: #ff0000;
    font-weight: 700;
    font-size: 20px;
}

.menu {
    margin-left: 40px;
}

.menu a {
    margin-right: 25px;
    cursor: pointer;
}

.page {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.active {
    display: flex;
}

.hero {
    background: linear-gradient(to bottom, #000, #300000);
}

.hero h1 {
    font-size: 50px;
    color: red;
}

/* OFFRES */
.cards {
    display: flex;
    gap: 30px;
}

.card {
    background: #111;
    padding: 40px;
    border-radius: 15px;
    cursor: pointer;
}

/* FORM */
form {
    width: 100%;
    max-width: 400px;
}

input, textarea {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background: #111;
    color: white;
}

button {
    width: 100%;
    padding: 14px;
    background: red;
    border: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<nav>
    <div class="logo">OMEGAFIT</div>
    <div class="menu">
        <a onclick="showPage('accueil')">Accueil</a>
        <a onclick="showPage('offre')">Offre</a>
        <a onclick="showPage('resultats')">Résultats</a>
    </div>
</nav>

<!-- ACCUEIL -->
<div id="accueil" class="page active hero">
    <h1>Transforme ton corps</h1>
</div>

<!-- OFFRE -->
<div id="offre" class="page">
    <h1>Coaching en salle</h1>

    <div class="cards">
        <div class="card" onclick="goForm()">
            <h2>Coaching</h2>
            <p>30€/mois</p>
        </div>
    </div>
</div>

<!-- FORMULAIRE -->
<div id="formulaire" class="page">
    <h1>Commencer</h1>

    <form id="coachingForm">
        <input type="text" placeholder="Nom / Prénom" required>
        <input type="email" placeholder="Email" required>
        <input type="text" placeholder="Objectif">
        <input type="text" placeholder="Poids / Taille">
        <textarea placeholder="Blessures / Infos"></textarea>

        <button type="submit">Envoyer</button>
    </form>
</div>

<!-- RESULTATS -->
<div id="resultats" class="page">
    <h1>Résultats</h1>
</div>

<script>
// NAVIGATION
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

// OFFRE → FORM
function goForm() {
    showPage('formulaire');
}

// EMAIL
document.getElementById("coachingForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const nom = this[0].value;
    const email = this[1].value;
    const objectif = this[2].value;
    const poids = this[3].value;
    const blessures = this[4].value;

    const body = `
Nom: ${nom}
Email: ${email}
Objectif: ${objectif}
Poids: ${poids}
Blessures: ${blessures}
    `;

    window.location.href =
    `mailto:TONEMAIL@gmail.com?subject=Demande Coaching&body=${encodeURIComponent(body)}`;
});
</script>

</body>
</html>
